name: catsos

services:
  backend:
    build:
      context: ./backend
      target: development
    env_file:
      - ./backend/.env
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: local-docker-secret
      DJANGO_ALLOWED_HOSTS: localhost,backend
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/', timeout=2)\""]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_GOOGLE_CLIENT_ID: 915271044751-bib6lhpmfj2fc0169fd43c93lm758lrh.apps.googleusercontent.com
      VITE_MICROSOFT_CLIENT_ID: 68f68d94-0731-4b3c-8584-977b6ba93287
      VITE_MICROSOFT_TENANT_ID: common
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend-node-modules:
